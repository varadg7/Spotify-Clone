<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VARADify</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="utility.css">
</head>

<body>
    <div class="container flex bg-black">
        <div class="left border justify-center align-center  ">
            <div class="close">
                <img width=20px src="close.svg" alt="close">
            </div>
            <div class="home bg-grey rounded m-1 p-1">
                <div class="logo"> <img class="invert" src="logo.svg" alt=""></div>
                <ul>
                    <li><img class="invert" src="home.svg" alt="home"> Home</li>
                    <li><img class="invert" src="search.svg" alt="search">Search</li>
                </ul>
            </div>

            <div class="library bg-grey flex rounded p-1 m-1 ">
                <div class="heading flex items-center ">
                    <img width=35px class="invert" src="playlis.svg" alt="">
                    <h2>Your Playlist</h2>
                </div>
                <div class="songlist">
                    <ul>
                        <!-- <li>
                        <img src="music.svg" alt="">
                        <div class="info">
                            <div>Song Name </div>
                            <div>Song Artist</div>
                        </div>
                        <div class="playnow">
                            <span>PLAY NOW</span>
                            <img src="play.svg" alt="">
                        </div>
                    </li> -->
                    </ul>
                </div>
                <div class="footer">
                    <div><a href="https://www.spotify.com/jp/legal/"><span>Legal</span></a></div>
                    <div><a href="https://www.spotify.com/jp/privacy/"><span>Privacy Center</span></a></div>
                    <div><a href="https://www.spotify.com/jp/legal/privacy-policy/"><span>Privacy Policy</span></a>
                    </div>
                    <div><a href="https://www.spotify.com/jp/legal/cookies-policy/"><span>Cookies</span></a></div>
                    <div><a href="https://www.spotify.com/jp/legal/privacy-policy/#s3"><span>About Ads</span></a></div>
                    <div><a href="https://www.spotify.com/jp/accessibility/"><span>Accessibility</span></a></div>
                </div>
            </div>

        </div>
        <div class="right  bg-grey  rounded ">
            <div class="header">
                <div class="nav">

                    <img class="hamburger" src="hamburger.svg" alt="">

                    <img class="invert" width="25" height="25"
                        src="https://img.icons8.com/ios-glyphs/30/long-arrow-left.png" alt="long-arrow-left" />
                    <img class="invert" width="25" height="25"
                        src="https://img.icons8.com/ios-filled/50/long-arrow-right.png" alt="long-arrow-right" />
                </div>
                <div class="buttons">
                    <button class="sign">SIGN UP</button>
                    <button class="login">LOG IN</button>
                </div>

            </div>
            <div class="spotify-playlist">
                <h1>Spotify Playlists</h1>
                <div class="cardcontainer">

                </div>
                  <div class="playbar">
                        <div class="seekbar">
                            <div class="circle">
                            </div>
                        </div>
                        <div class="abovebar">
                            <div class="songinfo"></div>
                            <div class="songbutton">
                                <img id="prev" src="prev.svg">
                                <img id="play" src="play.svg">
                                <img id="next" src="next.svg">
                            </div>
                            <div class="songtime"></div>
                            <div class="volume">
                                <img id="volumeIcon" src="volume.svg" width="25">
                                <input type="range" min="0" max="100" value="100">
                            </div>
                        </div>
                    </div>
            </div>
        </div>
    </div>


    <script src="script.js"></script>
</body>

</html>
